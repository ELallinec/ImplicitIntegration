name: Deploy PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: xu-cheng/latex-action@v2
        with:
          root_file: ImplicitIntegration.tex

      - name: Copy
        run: |
          mkdir -p out
          cp ./ImplicitIntegration.pdf ./out/ImplicitIntegration.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: ImplicitIntegration
          path: out/ImplicitIntegration.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: xu-cheng/latex-action@v2
        with:
          root_file: ImplicitIntegration.tex

      - name: Copy
        run: |
          mkdir -p out
          cp ./ImplicitIntegration.pdf ./out/ImplicitIntegration.pdf

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@3.6.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          CLEAN: true
          SINGLE_COMMIT: true
          FOLDER: out
          GIT_CONFIG_NAME: ELallinec
          GIT_CONFIG_EMAIL: ewen.lallinec@universite-paris-saclay.fr
