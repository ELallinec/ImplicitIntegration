name: Deploy PDF

on:
  push:
    branches: [main]
    paths:
      - '*.tex'
      - '*.bib'
      - '*.sty'
      - '*.cls'
      - 'Images/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LaTeX build files
        uses: actions/cache@v4
        with:
          path: |
            *.aux
            *.fdb_latexmk
            *.fls
            *.log
            *.out
            *.toc
            *.synctex.gz
          key: latex-${{ runner.os }}-${{ hashFiles('**/*.tex', '**/*.bib', '**/*.sty', '**/*.cls') }}
          restore-keys: |
            latex-${{ runner.os }}-

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ImplicitIntegration.tex

      - name: Prepare deployment folder
        run: |
          mkdir -p out
          cp ImplicitIntegration.pdf out/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          clean: true
          single-commit: true
